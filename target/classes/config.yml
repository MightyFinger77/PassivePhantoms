# PassivePhantoms Configuration
# This file is automatically generated on first run
# Note: Movement improvements are experimental and phantoms may still get hung up on chorus trees.

# Config version - do not modify (used for migration)
config_version: 2

# Enable/disable debug logging (console messages for targeting, spawns, stuck detection)
debug_logging: false

# Master switch: false = vanilla phantom behavior (no passive/aggressive or custom spawn)
passive_phantoms_enabled: true

# Check Modrinth for updates on startup; ops with passivephantoms.notify get in-game notice
update_checker: true

# Phantom behavior settings
phantom_settings:
  # When true: no phantom spawns in Overworld; End spawns via task below. When false: vanilla spawns only.
  custom_spawn_control: true
  
  # Chance per player per spawn interval to spawn one phantom in The End. Valid: 0.0 to 1.0
  end_spawn_chance: 0.05
  
  # Ticks between spawn rolls (200 = 10 sec). Valid: 100 to 600. Takes effect on reload/restart.
  end_spawn_interval_ticks: 200
  
  # Max phantoms allowed within spawn_check_radius of each player. Valid: 1 to 64
  max_phantoms_per_chunk: 8
  
  # Radius (blocks) around player to count phantoms for the cap. Valid: 8 to 256
  spawn_check_radius: 64.0
  
  # Stuck detection: teleport stuck phantoms or remove after max attempts
  movement_improvements_enabled: true
  
  # How often to run stuck/tree check (ticks). 20 = 1 second. Valid: 20 to 600
  stuck_detection_ticks: 100
  
  # Consecutive checks with movement < stuck_distance_threshold before "stuck". Valid: 1 to 20
  stuck_threshold: 3
  
  # Min blocks moved between checks to not count as stuck. Valid: 0.1 to 10.0
  stuck_distance_threshold: 1.0
  
  # Escape attempts before removing a stuck phantom. Valid: 1 to 20
  max_stuck_attempts: 5
  
  # When near chorus plants, nudge phantom velocity away from trees
  tree_avoidance_enabled: true
  
  # Block radius to search for chorus fruit (larger = more expensive). Valid: 1 to 16
  tree_avoidance_radius: 3.0
  


# Behavior Information:
# - Phantoms start passive and won't target players
# - Phantoms become aggressive when hit by players or projectiles (arrows, tridents, etc.)
# - Once aggressive, phantoms will target and attack players normally
# - Custom spawn control prevents phantoms from spawning in the Overworld
# - Phantoms can spawn in The End based on the configured chance
# - Per-chunk mobcap prevents infinite spawning and ensures fair distribution
# - Movement improvements help phantoms avoid getting stuck and fly around chorus fruit trees naturally
# - Stuck detection automatically helps or removes phantoms that can't move
# - Tree avoidance guides phantoms to fly around chorus fruit trees using gentle velocity adjustments 